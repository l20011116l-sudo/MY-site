<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="作品与项目" />
    <title>作品 · 蒋诚林</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <header class="site-header">
      <a class="brand" href="index.html">蒋诚林</a>
      <button
        type="button"
        class="nav-toggle"
        aria-expanded="false"
        aria-controls="site-nav"
      >
        菜单
      </button>
      <nav id="site-nav" class="nav" aria-label="主导航">
        <ul class="nav-list">
          <li><a href="index.html">首页</a></li>
          <li><a href="blog.html">笔记</a></li>
          <li><a href="work.html" aria-current="page">作品</a></li>
          <li><a href="about.html">关于</a></li>
        </ul>
      </nav>
    </header>

    <div class="layout">
      <div class="layout__slit" aria-hidden="true"></div>
      <main id="main" class="layout__main">
        <header class="hero" style="padding-bottom: var(--space-md); margin-bottom: var(--space-md)">
          <p class="hero__label">Works</p>
          <h1 class="hero__title" style="font-size: clamp(1.5rem, 3vw, 2rem)">
            作品与项目
          </h1>
          <p class="hero__lead">
            每个条目可链到外部仓库、演示站或说明页。下图块为占位，可换成截图或纯色块。
          </p>
        </header>

        <div class="work-grid">
          <article class="work-tile" style="text-decoration: none; color: inherit">
            <div>
              <p class="work-tile__label">Tool / 2026</p>
              <p class="work-tile__name">示例：工作流脚本</p>
              <p style="margin: 0.5rem 0 0; font-size: 0.85rem; color: var(--concrete-dark); position: relative">
                简述一句技术栈与解决的问题。
              </p>
            </div>
          </article>
          <article class="work-tile" style="text-decoration: none; color: inherit">
            <div>
              <p class="work-tile__label">Writing / 2026</p>
              <p class="work-tile__name">示例：长文或报告</p>
              <p style="margin: 0.5rem 0 0; font-size: 0.85rem; color: var(--concrete-dark); position: relative">
                链到 PDF 或站内文章。
              </p>
            </div>
          </article>
        </div>
      </main>
      <div class="layout__rail" aria-hidden="true"></div>
    </div>

    <footer class="site-footer">
      <p>© <span id="y"></span> 蒋诚林</p>
    </footer>
    <script>
      document.getElementById("y").textContent = new Date().getFullYear();
    </script>
    <script src="js/main.js" defer></script>
  </body>
</html>
